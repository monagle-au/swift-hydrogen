name: CI

on:
  # Only run CI on pull requests targeting main. Branch protection
  # enforces that every change to main goes through a PR, so a
  # `push: main` trigger here would just duplicate the PR run on
  # the resulting merge commit. Tag pushes are handled by
  # release.yml as the release gate.
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS / ${{ matrix.label }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: no traits
            traits: ""
          - label: all traits
            traits: "--traits Postgres,OTel,GCP"
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v ${{ matrix.traits }}

      - name: Test
        run: swift test -v ${{ matrix.traits }}

  linux:
    name: Linux / ${{ matrix.label }}
    runs-on: ubuntu-latest
    container: swift:6.2-noble
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: no traits
            traits: ""
          - label: all traits
            traits: "--traits Postgres,OTel,GCP"
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v ${{ matrix.traits }}

      - name: Test
        run: swift test -v ${{ matrix.traits }}

  docs:
    name: DocC build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build documentation (Hydrogen)
        run: swift package generate-documentation --target Hydrogen

      - name: Build documentation (HydrogenPostgres)
        run: swift package --traits Postgres generate-documentation --target HydrogenPostgres

      - name: Build documentation (HydrogenOTel)
        run: swift package --traits OTel generate-documentation --target HydrogenOTel

      - name: Build documentation (HydrogenGCP)
        run: swift package --traits GCP generate-documentation --target HydrogenGCP
